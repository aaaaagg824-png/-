<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عالم الهواتف - اتصل بنا</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="background-overlay"></div>

    <nav class="navbar">
        <a href="index.html" class="nav-brand">عالم الهواتف</a>
        <div class="nav-links">
            <a href="index.html">الرئيسية</a>
            <a href="products.html">المنتجات</a>
            <a href="cunncet.html" class="active">اتصل بنا</a>
        </div>
    </nav>

    <section class="container">
        <div class="contact-box" id="main-box">
            <h1 class="section-title">تواصل معنا</h1>
            <p>يسعدنا استقبال استفساراتكم حول أحدث الهواتف</p>

            <form class="contact-form" id="phoneForm">
                <input type="text" id="userName" placeholder="الاسم الثنائي" required>
                <input type="email" id="userEmail" placeholder="البريد الإلكتروني" required>
                <textarea id="userMsg" placeholder="ما هو نوع الهاتف الذي تستفسر عنه؟ (مثلاً: iPhone 15)" rows="5"
                    required></textarea>
                <button type="submit" class="submit-btn" id="submitBtn">إرسال الرسالة</button>
            </form>
        </div>
    </section>

    <script src="script.js"></script>
</body>

</html>
